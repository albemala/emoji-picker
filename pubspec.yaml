name: emoji_picker
description: Ejimo - Comprehensive emoji and symbol picker.
version: 4.0.3+19

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # state management
  equatable: ^2.0.8
  fast_immutable_collections: ^11.1.0
  flutter_bloc: ^9.0.0
  # data storage
  flutter_data_storage:
    git:
      url: https://github.com/albemala/flutter_data_storage.git
      ref: 3.5.0

  # UI
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  sliver_tools: ^0.2.12
  slivers: ^0.0.1+2

  # search
  fuzzywuzzy: ^1.2.0
  easy_debounce: ^2.0.3

  # utils
  cross_platform: ^3.0.1
  collection: ^1.18.0
  package_info_plus: ^9.0.0 # about version
  flutter_utils:
    git:
      url: https://github.com/albemala/flutter_utils.git
      ref: 2.0.3

  sentry_flutter: ^9.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  # flutter test --update-goldens test/screenshots/take_screenshots_test.dart
  golden_screenshot: ^10.0.0

  very_good_analysis: ^10.2.0

  build_runner: ^2.11.1
  icons_launcher: ^3.0.3
  package_rename: ^1.10.1

  http: ^1.6.0
  path: ^1.9.0

  # windows
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/app-icon/
    - assets/data/
    - assets/fonts/TitilliumWeb/
    - assets/fonts/Noto_Color_Emoji/
    - assets/other_apps_icons/
  fonts:
    # https://github.com/notofonts/notofonts.github.io/tree/main/megamerge
    - family: Noto Sans Living
      fonts:
        - asset: assets/fonts/NotoSans/NotoSansLiving-Regular.ttf
          weight: 400
    # https://github.com/notofonts/noto-cjk/tree/main/Sans/SubsetOTF
    - family: Noto Sans Japanese
      fonts:
        - asset: assets/fonts/NotoSans/NotoSansJP-Regular.otf
          weight: 400
    - family: Noto Sans Korean
      fonts:
        - asset: assets/fonts/NotoSans/NotoSansKR-Regular.otf
          weight: 400
    - family: Noto Sans Simplified Chinese
      fonts:
        - asset: assets/fonts/NotoSans/NotoSansSC-Regular.otf
          weight: 400

# dart run icons_launcher:create && flutter clean && flutter pub get
icons_launcher:
  image_path: "assets/app-icon/app-icon.png"
  platforms:
    android:
      enable: false
    ios:
      enable: false
    macos:
      enable: true
    windows:
      enable: false
    linux:
      enable: false
    web:
      enable: false

# dart run package_rename
package_rename_config:
  android:
    app_name: Ejimo
    package_name: me.albemala.ejimo
  ios:
    app_name: Ejimo
    bundle_name: Ejimo
    package_name: me.albemala.ejimo
  macos:
    app_name: Ejimo
    package_name: me.albemala.ejimo
    copyright_notice: Copyright © 2026 Alberto Malagoli (albemala.me). All rights reserved.
  windows:
    app_name: Ejimo
    organization: albemala.me
    copyright_notice: Copyright © 2026 Alberto Malagoli (albemala.me).
    exe_name: Ejimo
  linux:
    app_name: Ejimo
    package_name: me.albemala.ejimo
    exe_name: Ejimo
  web:
    app_name: Ejimo
    description: Find and copy unicode characters, emoji, kaomoji and symbols with Ejimo.

msix_config:
  # Windows Store
  msix_version: 2.0.2.0
  # App
  display_name: Ejimo
  logo_path: assets/images/app-icon.png
  start_menu_icon_path: assets/images/app-icon.png
  tile_icon_path: assets/images/app-icon.png
  icons_background_color: transparent
  languages: en-us
  architecture: x64